name: tiko

x-api-build: &api-build
  context: ..
  dockerfile: infra/api.Dockerfile

x-api-environment: &api-environment
  TIKO_ENVIRONMENT: container
  TIKO_SAFETY_MODE: simulation_only
  TIKO_ALLOW_PRIVATE_EXCHANGE_METHODS: "false"
  TIKO_ALLOW_TRADING_CREDENTIALS: "false"
  TIKO_DATABASE_URL: "postgresql+psycopg://tiko:${POSTGRES_PASSWORD:-tiko}@postgres:5432/tiko"
  TIKO_REDIS_URL: redis://redis:6379/0
  TIKO_OBJECT_STORE_ENDPOINT: http://object-store:9000
  TIKO_PRIMARY_HISTORICAL_CONNECTOR: ccxt
  TIKO_PRIMARY_REALTIME_CONNECTOR: cryptofeed
  TIKO_RAW_STORAGE_URI: s3://tiko-market-data/raw
  TIKO_NORMALIZED_STORAGE: postgresql
  TIKO_CCXT_ENABLED: "true"
  TIKO_CCXT_ENABLED_EXCHANGES: '["binance","okx"]'
  TIKO_CRYPTOFEED_ENABLED: "true"
  TIKO_CRYPTOFEED_CHANNELS: '["trades","l2_book","ticker","candles","funding","open_interest"]'
  TIKO_CRYPTOFEED_AUTHENTICATED_CHANNELS_ENABLED: "false"

services:
  web:
    build:
      context: ../app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_started

  api:
    build: *api-build
    ports:
      - "8000:8000"
    environment: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      object-store:
        condition: service_started

  worker:
    build: *api-build
    command: [".venv/bin/python", "-m", "tiko.workers.main"]
    environment: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      object-store:
        condition: service_started

  scheduler:
    build: *api-build
    command: [".venv/bin/python", "-m", "tiko.runtime.scheduler"]
    environment: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      object-store:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tiko
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-tiko}"
      POSTGRES_DB: tiko
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiko -d tiko"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7

  object-store:
    image: minio/minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: tiko
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-tiko-local-only}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - objectdata:/data

volumes:
  pgdata:
  objectdata:
